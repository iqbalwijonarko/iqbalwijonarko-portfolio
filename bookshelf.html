<!DOCTYPE html>
<html lang="en">
<!--
  Bookshelf — layout rationale (adjust freely)
  ------------------------------------------------------------------
  A responsive grid of quiet cards, reusing the site's existing card
  language (same border, 10px radius, soft shadow, hover-lift as the
  Experience/Project cards) so the page feels native, not bolted on.

  Goodreads exports carry no reliable cover URLs, so each card leads
  with a text placeholder tile — the title on a muted, deterministically
  colored panel (low saturation, Apple-restrained). If you later add a
  "cover" path to a book in books.json, the image replaces the tile
  (lazy-loaded, fixed size to avoid layout shift); title/author/rating
  still render below it.

  Per card: title, author, star rating (filled/empty markers, not raw
  numbers), and year read. Shelf shows as a subtle tag. Two vanilla
  controls earn their place at ~30 books: a shelf filter and a sort
  (recently read / rating / title). No libraries, no runtime API calls —
  the page only fetches the static books.json, generated locally by
  build-books.js.
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf | Iqbal Wijonarko</title>
  <meta name="description" content="Books Iqbal Wijonarko has read and is reading — business, strategy, product, and the people who built things, with personal ratings.">

  <meta name="twitter:card" content="summary_large_image">

<body>
  <header class="site-nav">
    <div class="nav-inner">

      </nav>

  <div class="container">
    <h1 class="page-title">Bookshelf</h1>
    <p class="page-intro">What I've been reading, mostly business, strategy, product, and the people who built things. Ratings are my own, and the shelf updates whenever I export from my <a href="https://www.goodreads.com/user/show/172769224-iqbal-wijonarko" target="_blank" rel="noopener noreferrer">Goodreads profile</a>, which you're welcome to follow.</p>

    <div class="book-controls">
      <div class="post-filters" id="book-filters" role="group" aria-label="Filter by shelf"></div>
      <label class="book-sort">
        <span class="book-sort-label">Sort</span>
        <select id="book-sort" aria-label="Sort books">
          <option value="recent">Recently read</option>
          <option value="rating">Rating</option>
          <option value="title">Title (A–Z)</option>
        </select>
      </label>
    </div>

    <ul class="book-grid" id="book-list" aria-label="Books"></ul>
  </div>
